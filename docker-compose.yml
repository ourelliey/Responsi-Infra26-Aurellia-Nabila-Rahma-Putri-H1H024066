services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web1
      - web2
      - web3
    networks:
      - frontend

  web1:
    build:
      context: ./web1
    environment:
      - DB_HOST=db
      - DB_NAME=responsi
      - DB_USER=student
      - DB_PASS=student123
    networks:
      - frontend
      - backend
    depends_on:
      - db

  web2:
    build:
      context: ./web2
    environment:
      - DB_HOST=db
      - DB_NAME=responsi
      - DB_USER=student
      - DB_PASS=student123
    networks:
      - frontend
      - backend
    depends_on:
      - db

  web3:
    build:
      context: ./web3
    environment:
      - DB_HOST=db
      - DB_NAME=responsi
      - DB_USER=student
      - DB_PASS=student123
    networks:
      - frontend
      - backend
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=root123
      - MYSQL_DATABASE=responsi
      - MYSQL_USER=student
      - MYSQL_PASSWORD=student123
    volumes:
      - db-data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - backend

networks:
  frontend:
  backend:

volumes:
  db-data:
